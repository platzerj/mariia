// ── utils ──────────────────────────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// German text-to-speech
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  utter.rate = 0.85;
  utter.pitch = 1;
  // try to pick a German voice if available
  const voices = window.speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de'));
  if(deVoice) utter.voice = deVoice;
  window.speechSynthesis.speak(utter);
}

// Preload voices (some browsers load them async)
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = ()=>{};
  window.speechSynthesis.getVoices();
}

function speakBtn(text, size){
  const sz = size || 'small';
  const sizes = {
    small: {fs:'14px', pad:'4px 8px', w:'auto'},
    medium: {fs:'16px', pad:'6px 12px', w:'auto'},
    large: {fs:'18px', pad:'8px 14px', w:'auto'}
  };
  const s = sizes[sz];
  return h('button',{
    style:{background:'rgba(201,169,110,0.15)',border:'1px solid rgba(201,169,110,0.4)',
      borderRadius:'8px',padding:s.pad,color:'#8a6830',fontSize:s.fs,
      cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'4px',
      lineHeight:'1'},
    title:'Listen',
    onClick:(e)=>{e.stopPropagation();speak(text);}
  },'🔊');
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')&&typeof v==='function'){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==='className'){el.className=v;}
    else{el.setAttribute(k,v);}
  }
  for(const c of children.flat()){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}

let state = {
  screen: 'home',   // 'home' | 'exercise'
  topicKey: 'greetings',
  modeId: 'cards',
  score: {correct:0,total:0},
  // per-mode
  cardIdx:0, cardStage:0,
  fillIdx:0, fillVal:'', fillResult:null,
  mcIdx:0, mcChosen:null,
  sortIdx:0, sortPool:[], sortChosen:[],
  pairsCards:[], pairsSel:[], pairsMatched:[], pairsWrong:[], pairsDone:false,
  dialogRevealed:[], dialogShowAll:false,
};

function setState(patch){
  Object.assign(state,typeof patch==='function'?patch(state):patch);
  render();
}

function addScore(correct){
  setState(s=>({score:{correct:s.score.correct+(correct?1:0),total:s.score.total+1}}));
}

function selectTopic(key){
  setState({screen:'exercise',topicKey:key,modeId:'cards',score:{correct:0,total:0}});
  initMode('cards',key);
}
function selectMode(id){
  setState({modeId:id,score:{correct:0,total:0}});
  initMode(id,state.topicKey);
}
function goHome(){setState({screen:'home',score:{correct:0,total:0}});}

function initMode(modeId,topicKey){
  const topic=TOPICS[topicKey];
  if(modeId==='cards'){setState({cardIdx:0,cardStage:0});}
  else if(modeId==='fill'){setState({fillIdx:0,fillVal:'',fillResult:null});}
  else if(modeId==='mc'){setState({mcIdx:0,mcChosen:null});}
  else if(modeId==='sort'){initSort(topic,0);}
  else if(modeId==='pairs'){initPairs(topic);}
  else if(modeId==='dialog'){setState({dialogRevealed:[],dialogShowAll:false});}
}

function initSort(topic,idx){
  const item=topic.sort[idx];
  setState({sortIdx:idx,sortPool:shuffle(item.words).map((w,i)=>({w,id:i})),sortChosen:[],sortResult:null});
}
function initPairs(topic){
  const pairs=topic.pairs;
  const all=[
    ...pairs.map((p,i)=>({id:'de'+i,text:p.de,pairId:i,side:'de'})),
    ...pairs.map((p,i)=>({id:'ru'+i,text:p.ru,pairId:i,side:'ru'})),
  ];
  setState({pairsCards:shuffle(all),pairsSel:[],pairsMatched:[],pairsWrong:[],pairsDone:false});
}

function renderCards(topic){
  const card=topic.cards[state.cardIdx];
  const stage=state.cardStage;

  const bgMap=['rgba(255,255,255,0.65)','rgba(201,169,110,0.12)','rgba(201,169,110,0.2)'];
  const bdMap=['rgba(201,169,110,0.25)','rgba(201,169,110,0.4)','rgba(201,169,110,0.55)'];

  const cardEl=h('div',{
    style:{background:bgMap[stage],border:`1px solid ${bdMap[stage]}`,borderRadius:'18px',
      padding:'32px 22px',minHeight:'190px',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',textAlign:'center',cursor:stage<2?'pointer':'default',
      transition:'all 0.25s',userSelect:'none'},
    onClick:()=>{if(stage<2)setState({cardStage:stage+1});}
  },
    h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'2px'}},
      h('div',{style:{fontSize:'24px',fontWeight:'700',color:S.text}},card.de),
      speakBtn(card.de, 'medium')
    ),
    card.translit?h('div',{style:{fontSize:'13px',color:S.label,marginBottom:'8px',fontStyle:'italic',letterSpacing:'0.03em'}},card.translit):null,
    stage===0?h('div',{style:{fontSize:'12px',color:S.label,marginTop:'6px'}},'👆 Tap to see translation'):null,
    stage>=1?h('div',{style:{fontSize:'22px',color:'#5a7fa8',marginTop:'8px',fontWeight:'600'}},card.ru):null,
    stage===1?h('div',{style:{fontSize:'12px',color:S.label,marginTop:'6px'}},'👆 Tap to see example sentence'):null,
    stage>=2&&card.example?h('div',{style:{borderTop:'1px solid rgba(201,169,110,0.2)',paddingTop:'12px',marginTop:'12px',display:'flex',flexDirection:'column',gap:'8px',alignItems:'center'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px',justifyContent:'center'}},
        h('div',{style:{fontSize:'13px',color:S.subtext,fontStyle:'italic'}},card.example),
        speakBtn(card.example, 'small')
      ),
      card.exampleRu?h('div',{style:{fontSize:'12px',color:'#7a9ab8',fontStyle:'italic'}},card.exampleRu):null
    ):null,
    stage===0?h('div',{style:{fontSize:'12px',color:S.label,marginTop:'10px'}},'Tap → see translation 👆'):null,
    stage===1?h('div',{style:{fontSize:'12px',color:S.label,marginTop:'10px'}},'Tap → see example sentence 👆'):null
  );

  const dots=h('div',{style:{display:'flex',justifyContent:'center',gap:'6px',marginTop:'10px'}},
    ...[0,1,2].map(s=>h('div',{style:{width:'6px',height:'6px',borderRadius:'50%',
      background:stage>=s?S.gold:'rgba(42,34,24,0.15)',transition:'background 0.2s'}}))
  );

  function go(dir){
    const next=(state.cardIdx+dir+topic.cards.length)%topic.cards.length;
    setState({cardIdx:next,cardStage:0});
  }

  const nav=h('div',{style:{display:'flex',gap:'10px',marginTop:'12px'}},
    h('button',{style:{...S.btnBase,flex:'1'},onClick:()=>go(-1)},'← Back'),
    h('button',{style:{...S.btnBase,...S.btnGold,flex:'2'},onClick:()=>go(1)},'Next →')
  );

  return h('div',{},
    h('div',{style:{textAlign:'center',fontSize:'11px',color:S.label,marginBottom:'10px'}},
      (state.cardIdx+1)+' / '+topic.cards.length),
    cardEl,dots,nav
  );
}

// ── FILL BLANKS ───────────────────────────────────────────────────────────────
function renderFill(topic){
  const item=topic.fill[state.fillIdx];

  function check(){
    const inp=document.getElementById('fill-input');
    const val=inp?inp.value:state.fillVal;
    state.fillVal=val;
    const ok=val.trim().toLowerCase()===item.answer.toLowerCase();
    addScore(ok);
    setState({fillResult:ok?'correct':'wrong'});
  }
  function next(){
    const nextIdx=(state.fillIdx+1)%topic.fill.length;
    setState({fillIdx:nextIdx,fillVal:'',fillResult:null});
  }

  const border=state.fillResult===null?'1px solid rgba(255,255,255,0.12)':
    state.fillResult==='correct'?'1px solid rgba(80,200,110,0.5)':'1px solid rgba(210,90,90,0.5)';

  const input=h('input',{
    type:'text',
    id:'fill-input',
    placeholder:'Your answer...',
    autocomplete:'off',
    autocorrect:'off',
    autocapitalize:'none',
    spellcheck:'false',
    style:{width:'100%',background:'rgba(255,255,255,0.8)',border,borderRadius:'10px',
      padding:'12px 14px',color:S.text,fontSize:'18px',textAlign:'center'},
    onInput:(e)=>{state.fillVal=e.target.value; if(state.fillResult){state.fillResult=null;render();}},
    onKeydown:(e)=>{if(e.key==='Enter'&&!state.fillResult){const v=document.getElementById('fill-input');if(v&&v.value.trim())check();}  }
  });

  return h('div',{},
    h('div',{style:{textAlign:'center',fontSize:'11px',color:S.label,marginBottom:'10px'}},
      'Exercise '+(state.fillIdx+1)+' / '+topic.fill.length),
    h('div',{style:{...S.card}},
      h('div',{style:{fontSize:'19px',color:S.text,textAlign:'center',lineHeight:'1.6',marginBottom:'6px'}},
        item.sentence.replace('___','______')),
      h('div',{style:{fontSize:'12px',color:S.subtext,textAlign:'center',marginBottom:'18px'}},
        'Hint: '+item.hint),
      input,
      state.fillResult?h('div',{style:{marginTop:'10px',textAlign:'center',fontSize:'15px',
        color:state.fillResult==='correct'?S.green:S.red}},
        state.fillResult==='correct'?'✓ Correct! 🎉':'✗ Answer: "'+item.answer+'"'
      ):null
    ),
    h('div',{style:{marginTop:'13px'}},
      !state.fillResult
        ?h('button',{
            style:{...S.btnBase,...S.btnGold,width:'100%'},
            onClick:()=>{const inp=document.getElementById('fill-input');if(inp&&inp.value.trim())check();}
          },'Check ✓')
        :h('button',{style:{...S.btnBase,...S.btnGold,width:'100%'},onClick:next},'Next →')
    )
  );
}

// ── MULTIPLE CHOICE ───────────────────────────────────────────────────────────
function renderMC(topic){
  const item=topic.mc[state.mcIdx];

  function pick(i){
    if(state.mcChosen!==null)return;
    addScore(i===item.correct);
    setState({mcChosen:i});
  }
  function next(){
    setState({mcIdx:(state.mcIdx+1)%topic.mc.length,mcChosen:null});
  }

  const opts=item.options.map((opt,i)=>{
    const isCorrect=i===item.correct;
    const isChosen=state.mcChosen===i;
    let bg='rgba(255,255,255,0.55)',border='1px solid rgba(42,34,24,0.12)',color=S.text;
    if(state.mcChosen!==null){
      if(isCorrect){bg='rgba(74,138,90,0.15)';border='1px solid rgba(74,138,90,0.4)';color=S.green;}
      else if(isChosen){bg='rgba(160,64,64,0.1)';border='1px solid rgba(160,64,64,0.35)';color=S.red;}
    }
    const label=state.mcChosen!==null&&isCorrect?'✓':state.mcChosen!==null&&isChosen?'✗':['A','B','C','D'][i];
    return h('button',{
      style:{background:bg,border,borderRadius:'12px',padding:'13px 16px',color,
        fontSize:'15px',textAlign:'left',display:'flex',alignItems:'center',gap:'10px',width:'100%',
        cursor:state.mcChosen!==null?'default':'pointer'},
      onClick:()=>pick(i)
    },
      h('span',{style:{width:'26px',height:'26px',borderRadius:'50%',
        background:state.mcChosen!==null&&isCorrect?'rgba(74,138,90,0.2)':'rgba(42,34,24,0.06)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',flexShrink:'0',
        color:state.mcChosen!==null&&isCorrect?S.green:state.mcChosen!==null&&isChosen?S.red:'rgba(255,255,255,0.28)'}},
        label),
      opt
    );
  });

  return h('div',{},
    h('div',{style:{textAlign:'center',fontSize:'11px',color:S.label,marginBottom:'10px'}},
      'Question '+(state.mcIdx+1)+' / '+topic.mc.length),
    h('div',{style:{...S.card,marginBottom:'12px'}},
      h('div',{style:{fontSize:'17px',color:S.text,textAlign:'center',lineHeight:'1.5'}},item.q)
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'9px'}},...opts),
    state.mcChosen!==null?h('button',{style:{...S.btnBase,...S.btnGold,width:'100%',marginTop:'14px'},onClick:next},'Next →'):null
  );
}

// ── WORD SORT ─────────────────────────────────────────────────────────────────
function renderSort(topic){
  const item=topic.sort[state.sortIdx];

  function pick(tok){
    if(state.sortResult)return;
    setState({sortPool:state.sortPool.filter(t=>t.id!==tok.id),sortChosen:[...state.sortChosen,tok]});
  }
  function unpick(tok){
    if(state.sortResult)return;
    setState({sortChosen:state.sortChosen.filter(t=>t.id!==tok.id),sortPool:[...state.sortPool,tok]});
  }
  function check(){
    const built=state.sortChosen.map(t=>t.w).join(' ');
    const ok=built===item.answer;
    addScore(ok);
    setState({sortResult:ok?'correct':'wrong'});
  }
  function reset(){initSort(topic,state.sortIdx);}
  function next(){
    const nextIdx=(state.sortIdx+1)%topic.sort.length;
    initSort(topic,nextIdx);
  }

  return h('div',{},
    h('div',{style:{textAlign:'center',fontSize:'11px',color:S.label,marginBottom:'10px'}},
      'Exercise '+(state.sortIdx+1)+' / '+topic.sort.length),
    h('div',{style:{...S.card}},
      h('div',{style:{fontSize:'12px',color:S.subtext,marginBottom:'10px',textAlign:'center'}},
        'Build a sentence — tap the words in the right order:'),
      // drop zone
      h('div',{style:{minHeight:'50px',background:'rgba(201,169,110,0.06)',
        border:'1.5px dashed rgba(201,169,110,0.35)',borderRadius:'10px',
        padding:'10px 12px',display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'14px'}},
        state.sortChosen.length===0
          ?h('span',{style:{color:S.label,fontSize:'13px',alignSelf:'center'}},'Place words here...')
          :state.sortChosen.map(tok=>
            h('button',{
              style:{background:'rgba(232,184,75,0.15)',border:'1px solid rgba(232,184,75,0.35)',
                borderRadius:'8px',padding:'6px 12px',color:S.gold,fontSize:'15px'},
              onClick:()=>unpick(tok)
            },tok.w)
          )
      ),
      // pool
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}},
        ...state.sortPool.map(tok=>
          h('button',{
            style:{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',
              borderRadius:'8px',padding:'6px 12px',color:'rgba(255,255,255,0.7)',fontSize:'15px'},
            onClick:()=>pick(tok)
          },tok.w)
        )
      ),
      state.sortResult?h('div',{style:{marginTop:'12px',textAlign:'center',fontSize:'15px',
        color:state.sortResult==='correct'?S.green:S.red}},
        state.sortResult==='correct'?'✓ Correct! 🎉':'✗ Answer: "'+item.answer+'"'
      ):null
    ),
    h('div',{style:{display:'flex',gap:'10px',marginTop:'13px'}},
      h('button',{style:{...S.btnBase,flex:'1'},onClick:reset},'↺ Reset'),
      !state.sortResult
        ?h('button',{
            style:{...S.btnBase,...(state.sortChosen.length>0?S.btnGold:{}),flex:'2'},
            onClick:()=>{if(state.sortChosen.length>0)check();}
          },'Check ✓')
        :h('button',{style:{...S.btnBase,...S.btnGold,flex:'2'},onClick:next},'Next →')
    )
  );
}

// ── PAIR MATCH ────────────────────────────────────────────────────────────────
function renderPairs(topic){
  function tap(card){
    if(state.pairsMatched.includes(card.id)||state.pairsWrong.includes(card.id))return;
    if(state.pairsSel.find(s=>s.id===card.id)){setState({pairsSel:[]});return;}
    const newSel=[...state.pairsSel,card];
    if(newSel.length===2){
      const[a,b]=newSel;
      if(a.pairId===b.pairId&&a.side!==b.side){
        const newMatched=[...state.pairsMatched,a.id,b.id];
        const done=newMatched.length===topic.pairs.length*2;
        addScore(true);
        setState({pairsMatched:newMatched,pairsSel:[],pairsDone:done});
      } else {
        addScore(false);
        setState({pairsWrong:[a.id,b.id]});
        setTimeout(()=>setState({pairsWrong:[],pairsSel:[]}),800);
      }
    } else {
      setState({pairsSel:newSel});
    }
  }

  const cards=state.pairsCards.map(card=>{
    const isMatched=state.pairsMatched.includes(card.id);
    const isSelected=!!state.pairsSel.find(s=>s.id===card.id);
    const isWrong=state.pairsWrong.includes(card.id);
    let bg='rgba(255,255,255,0.6)',border='1px solid rgba(42,34,24,0.12)',color=S.text,opacity='1';
    if(isMatched){bg='rgba(74,138,90,0.12)';border='1px solid rgba(74,138,90,0.3)';color=S.green;opacity='0.6';}
    else if(isWrong){bg='rgba(160,64,64,0.12)';border='1px solid rgba(160,64,64,0.4)';color=S.red;}
    else if(isSelected){bg='rgba(201,169,110,0.25)';border='1px solid rgba(201,169,110,0.6)';color:'#8a6830';}
    return h('button',{
      style:{background:bg,border,borderRadius:'12px',padding:'13px 10px',color,opacity,
        fontSize:'13px',textAlign:'center',minHeight:'52px',width:'100%',
        cursor:isMatched?'default':'pointer'},
      onClick:()=>!isMatched&&tap(card)
    },card.text);
  });

  return h('div',{},
    h('div',{style:{textAlign:'center',fontSize:'11px',color:S.label,marginBottom:'10px'}},
      'Find all pairs! '+(state.pairsMatched.length/2)+' / '+topic.pairs.length+' found'),
    state.pairsDone?h('div',{style:{textAlign:'center',fontSize:'18px',color:S.gold,marginBottom:'14px'}},
      '🎉 All pairs found! Wunderbar!'):null,
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'9px',maxWidth:'500px',margin:'0 auto'}},...cards),
    h('button',{style:{...S.btnBase,width:'100%',marginTop:'14px'},onClick:()=>initPairs(topic)},'↺ Shuffle again')
  );
}

// ── DIALOG ────────────────────────────────────────────────────────────────────
function renderDialog(topic){
  const lines=topic.dialog.map((line,i)=>{
    const isA=line.speaker==='A';
    const isRevealed=state.dialogShowAll||state.dialogRevealed.includes(i);
    return h('div',{
      style:{display:'flex',flexDirection:'column',alignItems:isA?'flex-start':'flex-end',cursor:'pointer'},
      onClick:()=>{
        const rev=state.dialogRevealed.includes(i)
          ?state.dialogRevealed.filter(x=>x!==i)
          :[...state.dialogRevealed,i];
        setState({dialogRevealed:rev});
      }
    },
      h('div',{style:{
        background:isA?'rgba(90,127,168,0.1)':'rgba(201,169,110,0.15)',
        border:`1px solid ${isA?'rgba(90,127,168,0.25)':'rgba(201,169,110,0.35)'}`,
        borderRadius:isA?'4px 14px 14px 14px':'14px 4px 14px 14px',
        padding:'10px 14px',maxWidth:'85%'
      }},
        h('div',{style:{fontSize:'11px',color:isA?'rgba(90,127,168,0.7)':'rgba(201,169,110,0.8)',marginBottom:'3px'}},
          isA?'🧑 A':'👩 B'),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
          h('div',{style:{fontSize:'15px',color:isA?'#3a5f88':'#8a6830'}},line.line),
          speakBtn(line.line, 'small')
        ),
        isRevealed?h('div',{style:{fontSize:'12px',color:S.subtext,marginTop:'5px',fontStyle:'italic'}},
          line.translation):null
      )
    );
  });

  return h('div',{},
    h('div',{style:{fontSize:'12px',color:S.subtext,textAlign:'center',marginBottom:'14px'}},
      'Read the dialog. Tap a line to see the translation.'),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},...lines),
    h('button',{
      style:{...S.btnBase,width:'100%',marginTop:'16px'},
      onClick:()=>setState({dialogShowAll:!state.dialogShowAll,dialogRevealed:[]})
    },state.dialogShowAll?'🙈 Hide translations':'👁 Show all translations')
  );
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const old=app.firstChild;
  const newEl=state.screen==='home'?renderHome():renderExercise();
  if(old)app.replaceChild(newEl,old);
  else app.appendChild(newEl);

  // restore input value after re-render
  if(state.screen==='exercise'&&state.modeId==='fill'){
    const inp=document.getElementById('fill-input');
    if(inp){
      inp.value=state.fillVal||'';
      if(!state.fillResult)inp.focus();
    }
  }
}

// init
initMode('cards','greetings');
render();
</script>
